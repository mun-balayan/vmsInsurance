<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VMS Insurance">
<meta name="theme-color" content="#0d1117">
<title>Insurance Monitor — Municipality of Balayan</title>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#21262d;
  --accent:#f0a500;--accent2:#c98400;--accent-glow:rgba(240,165,0,0.15);
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --border:#30363d;--border2:#21262d;--card:#161b22;
  --sidebar-w:240px;--topbar-h:58px;--radius:8px;--radius-lg:12px;
  --safe-bot:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
  --font-ui:'IBM Plex Sans',sans-serif;--font-head:'Rajdhani',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);line-height:1.5;overflow:hidden;height:100vh;height:100dvh;}
button{font-family:var(--font-ui);cursor:pointer;}
input,textarea,select{font-family:var(--font-ui);}
h1,h2,h3,h4,h5{font-family:var(--font-head);letter-spacing:.3px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── LAYOUT ── */
#shell{display:flex;height:100vh;height:100dvh;overflow:hidden;}
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:200;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.sidebar-brand{padding:20px 20px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand-logo{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.brand-name{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--accent);letter-spacing:.5px;line-height:1.1;}
.brand-sub{font-size:10px;color:var(--text2);letter-spacing:.3px;margin-top:1px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 0;}
.nav-section-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:14px 20px 6px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 20px;font-size:13.5px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color .15s,background .15s;position:relative;}
.nav-item:hover{color:var(--text);background:var(--bg3);}
.nav-item.active{color:var(--accent);background:var(--accent-glow);}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--bg4);border-radius:20px;padding:1px 7px;font-size:11px;color:var(--text2);font-family:var(--font-mono);}
.nav-item.active .nav-badge{background:var(--accent-glow);color:var(--accent);}
.sidebar-footer{border-top:1px solid var(--border);padding:14px 20px;font-size:11px;color:var(--text3);flex-shrink:0;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;padding-top:var(--safe-top);}
#topbar-menu-btn{display:none;background:none;border:none;color:var(--text2);font-size:22px;padding:4px;line-height:1;}
.topbar-title{font-family:var(--font-head);font-size:20px;font-weight:700;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-refresh{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:5px;transition:all .15s;}
.topbar-refresh:hover{color:var(--text);border-color:var(--accent);}
.topbar-time{font-family:var(--font-mono);font-size:12px;color:var(--text2);}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:24px;animation:pageFade .2s ease;}
.page.active{display:block;}
@keyframes pageFade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
#bottom-nav{display:none;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bot);}
.bnav-inner{display:flex;}
.bnav-btn{flex:1;background:none;border:none;color:var(--text2);display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;font-size:10px;gap:3px;transition:color .15s;}
.bnav-btn.active{color:var(--accent);}
.bnav-icon{font-size:20px;line-height:1;}

/* ── COMPONENTS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s;}
.card:hover{border-color:#3d444d;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-title{font-family:var(--font-head);font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;}
.card-body{padding:18px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:border-color .2s,transform .2s;animation:fadeUp .3s ease both;}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.stat-icon{font-size:26px;margin-bottom:10px;}
.stat-num{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--accent);line-height:1;}
.stat-label{font-size:11px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-amber{background:rgba(240,165,0,.12);color:var(--accent);border:1px solid rgba(240,165,0,.2);}
.badge-blue{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.2);}
.badge-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.2);}
.badge-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.2);}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius);padding:8px 16px;font-family:var(--font-ui);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:var(--accent2);}
.btn-default{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-default:hover{border-color:#58a6ff;color:var(--blue);}
.btn-danger{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.2);}
.btn-danger:hover{background:rgba(248,81,73,.2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none;}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px 8px 34px;color:var(--text);font-size:13.5px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap;}
.pill:hover{border-color:var(--text2);color:var(--text);}
.pill.active{background:var(--accent-glow);border-color:rgba(240,165,0,.4);color:var(--accent);font-weight:600;}
.page-header{margin-bottom:22px;}
.page-title{font-family:var(--font-head);font-size:26px;font-weight:700;display:flex;align-items:center;gap:10px;}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--bg3);position:sticky;top:0;z-index:1;}
thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);cursor:pointer;}
tbody td{padding:12px 14px;vertical-align:middle;}
.td-name{font-weight:500;color:var(--text);}
.td-mono{font-family:var(--font-mono);font-size:12px;color:var(--accent);}
.td-muted{color:var(--text2);font-size:12px;}

/* ── INSURANCE ALERT STYLES ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.ins-alert-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--radius);margin-bottom:8px;font-size:13px;font-weight:500;}
.ins-alert-bar:last-child{margin-bottom:0;}
.ins-alert-expired{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:var(--red);}
.ins-alert-warning{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.25);color:#e3b341;}
.ins-alert-ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);color:var(--green);}
.ins-alert-icon{font-size:16px;flex-shrink:0;}
.ins-alert-info{flex:1;min-width:0;}
.ins-alert-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ins-alert-meta{font-size:11px;opacity:.8;margin-top:1px;}
.ins-alert-days{font-family:var(--font-mono);font-size:12px;white-space:nowrap;flex-shrink:0;}
.alert-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.alert-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;}
.alert-chip-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.2);}
.alert-chip-yellow{background:rgba(210,153,34,.12);color:#e3b341;border:1px solid rgba(210,153,34,.2);}
.alert-chip-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.2);}
.ins-section-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.ins-card-date{font-size:11px;color:var(--text2);font-family:var(--font-mono);margin-top:2px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease;box-shadow:var(--shadow);}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-head);font-size:20px;font-weight:700;}
.modal-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:17px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 22px;}
.detail-section{margin-bottom:18px;}
.detail-section-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border2);gap:16px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-size:12px;color:var(--text2);flex-shrink:0;}
.detail-value{font-size:13px;text-align:right;word-break:break-all;}
.v-hero{text-align:center;padding:14px 0 20px;}
.v-hero-icon{font-size:52px;margin-bottom:10px;}
.v-hero-name{font-family:var(--font-head);font-size:22px;font-weight:700;}
.v-hero-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px;}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
.form-input,.form-select,.form-textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13.5px;outline:none;transition:border-color .15s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:var(--bg4);}
.form-textarea{resize:vertical;min-height:80px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border);margin-top:20px;}

/* ── UTILITY ── */
.loading{text-align:center;padding:60px 20px;color:var(--text2);}
.loading-spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.5;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.gap-8{gap:8px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);pointer-events:none;transition:all .25s;box-shadow:var(--shadow);max-width:300px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-color:rgba(63,185,80,.4);color:var(--green);}
.toast.error{border-color:rgba(248,81,73,.4);color:var(--red);}

/* ── OFFLINE BANNER ── */
#offline-banner{display:none;background:#d29922;color:#000;text-align:center;padding:7px 16px;font-size:12.5px;font-weight:600;flex-shrink:0;border-bottom:2px solid #b8810f;}
#offline-banner.show{display:block;}

/* ── MOBILE CARDS ── */
.mobile-cards{display:none;}
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;animation:fadeUp .2s ease both;}
.m-card:active{background:var(--bg3);}
.m-card-title{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.m-card-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);gap:8px;flex-wrap:wrap;}
.fab{display:none;position:fixed;right:18px;bottom:calc(60px + 14px + var(--safe-bot));width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:#000;font-size:26px;box-shadow:0 4px 18px rgba(240,165,0,.4);align-items:center;justify-content:center;z-index:50;transition:transform .15s;}
.fab:active{transform:scale(.9);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  :root{--topbar-h:50px;}
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);box-shadow:var(--shadow);}
  #sidebar-overlay.open{display:block;}
  #topbar-menu-btn{display:flex;}
  #topbar-add-btn{display:none !important;}
  #bottom-nav{display:block;}
  .page{padding:12px 12px calc(10px + var(--safe-bot));}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .stat-card{padding:12px 10px;}
  .stat-num{font-size:24px;}
  .form-grid{grid-template-columns:1fr;}
  .form-actions{flex-direction:column-reverse;}
  .form-actions .btn{width:100%;justify-content:center;}
  .topbar-time{display:none;}
  .topbar-refresh{display:none;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal{max-width:100%;border-radius:16px 16px 0 0;max-height:90dvh;}
  .table-wrap{display:none;}
  .mobile-cards{display:block;}
  .hide-mobile{display:none!important;}
  .page-title{font-size:20px;}
  .page-header{margin-bottom:14px;}
  .fab{display:flex;}
  .card-body{padding:12px;}
  .card-header{padding:12px 14px;}
  .ins-alert-bar{padding:9px 12px;gap:8px;font-size:12.5px;}
  .alert-chip{font-size:11px;padding:5px 10px;}
  .pills{gap:5px;margin-bottom:10px;}
  .pill{padding:3px 10px;font-size:11px;}
  .bnav-btn{font-size:9px;padding:8px 0 6px;}
  .bnav-icon{font-size:18px;}
}
@media(max-width:390px){
  :root{--topbar-h:46px;}
  .stats-grid{gap:8px;}
  .stat-num{font-size:22px;}
  .ins-alert-bar{padding:8px 10px;gap:6px;}
}
@media(min-width:430px) and (max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
}
</style>
</head>
<body>

<div id="shell">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🛡</div>
        <div><div class="brand-name">VMS Insurance</div><div class="brand-sub">Municipality of Balayan</div></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <button class="nav-item active" id="snav-dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
      <div class="nav-section-label">Records</div>
      <button class="nav-item" id="snav-insurance" onclick="switchPage('insurance')"><span class="nav-icon">📋</span>Insurance<span class="nav-badge" id="badge-insurance">—</span></button>
    </nav>
    <div class="sidebar-footer">Municipality of Balayan, Batangas<br><span id="sidebar-time" style="font-family:var(--font-mono);"></span></div>
  </aside>
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div id="main">
    <div id="offline-banner">📵 Offline — view only. Changes cannot be saved until you reconnect.</div>
    <div id="topbar">
      <button id="topbar-menu-btn" onclick="toggleSidebar()">☰</button>
      <div><div class="topbar-title" id="topbar-title">Dashboard</div></div>
      <div class="topbar-right">
        <div class="topbar-time" id="topbar-time"></div>
        <button class="topbar-refresh" onclick="refreshCurrent()">↻ Refresh</button>
        <button class="btn btn-primary btn-sm" id="topbar-add-btn" onclick="openAddModal()">＋ Add New</button>
      </div>
    </div>

    <div id="content">
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">

      <!-- INSURANCE -->
      <div class="page" id="page-insurance">
        <div class="page-header">
          <div class="page-title">📋 Insurance & Registration <span style="font-size:16px;color:var(--text2);font-family:var(--font-ui);font-weight:400;" id="ins-count"></span></div>
          <div class="page-sub">GSIS insurance and LTO registration tracking</div>
        </div>
        <div class="toolbar">
          <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="ins-search" placeholder="Search vehicle, plate, department…" oninput="filterInsurance()"></div>
        </div>
        <div class="pills" id="ins-pills"></div>

        <button class="bnav-btn" id="bnav-insurance" onclick="switchPage('insurance')"><span class="bnav-icon">📋</span>Insurance</button>

  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ══════════════════════════════════════════════════
//  Same Firebase project as the main VMS
// ══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:     "AIzaSyCmoO3iEpR1R4GzHK2Z21YfCVV9_VRoMJo",
  authDomain: "vehicle-maintenance-syst-4fb2e.firebaseapp.com",
  projectId:  "vehicle-maintenance-syst-4fb2e",
  appId:      "1:513108103014:web:7ade19f5a6e6bb3e7f42a7",
};

(function initApp() {
  try {
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });

    // ── Online / Offline ──
    let isOnline = navigator.onLine;
    function setOnlineState(online) {
      isOnline = online;
      const banner = document.getElementById('offline-banner');
      const fab    = document.getElementById('fab-btn');
      const addBtn = document.getElementById('topbar-add-btn');
      if (online) {
        banner.classList.remove('show');
        if (fab)    fab.style.display = '';
        if (addBtn) addBtn.style.display = '';
      } else {
        banner.classList.add('show');
        if (fab)    fab.style.display = 'none';
        if (addBtn) addBtn.style.display = 'none';
      }
    }
    window.addEventListener('online',  () => { setOnlineState(true);  toast('Back online!','success'); });
    window.addEventListener('offline', () => { setOnlineState(false); });
    setOnlineState(navigator.onLine);

    // ══ STATE ══
    const S = {
      page: 'dashboard',
      insurance: [], insFilter: 'All', insSearch: '',
      editId: null,
    };
    const MONTHS = ['All','JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

    // ══ FIRESTORE ══
    const insCol = () => collection(db, 'vehicle_insurance');
    async function getAll()   { const s=await getDocs(insCol()); return s.docs.map(d=>({id:d.id,...d.data()})); }
    async function addRec(data)    { return await addDoc(insCol(), data); }
    async function updateRec(id,data) { return await updateDoc(doc(db,'vehicle_insurance',id), data); }
    async function deleteRec(id)   { return await deleteDoc(doc(db,'vehicle_insurance',id)); }

    // ══ CLOCK ══
    function updateTime() {
      const now = new Date();
      document.getElementById('topbar-time').textContent = now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('sidebar-time').textContent = now.toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'});
    }
    setInterval(updateTime, 1000); updateTime();

    // ══ NAVIGATION ══
    function switchPage(pg) {
      S.page = pg;
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.nav-item,.bnav-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById(`page-${pg}`).classList.add('active');
      document.getElementById(`snav-${pg}`)?.classList.add('active');
      document.getElementById(`bnav-${pg}`)?.classList.add('active');
      document.getElementById('topbar-title').textContent = pg==='dashboard'?'Dashboard':'Insurance & Registration';
      closeSidebar();
      if (pg==='dashboard') loadDashboard(); else loadInsurance();
    }
    window.switchPage = switchPage;
    window.refreshCurrent = () => switchPage(S.page);
    function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
    window.toggleSidebar = toggleSidebar; window.closeSidebar = closeSidebar;

    // ══ DATE HELPERS ══
    function normDateStr(s){ return s.replace(/\b([A-Z]{2,})\b/g, w=>w.charAt(0)+w.slice(1).toLowerCase()); }
    function safeParse(s){ const d=new Date(normDateStr(s.trim())); return isNaN(d)?null:d; }
    function parseInsDate(dateStr) {
      if (!dateStr||dateStr==='null') return null;
      const s = String(dateStr).trim();
      const toMatch = s.match(/^.+?\s+to\s+(.+)$/i);
      if (toMatch){ const d=safeParse(toMatch[1]); if(d) return d; }
      const dashMatch = s.match(/^.+?\s+[-–]\s+([A-Za-z].+)$/);
      if (dashMatch){ const d=safeParse(dashMatch[1]); if(d) return d; }
      const direct = safeParse(s); if(direct) return direct;
      const rangeMatch = s.match(/([A-Za-z]+)\s+\d+[-–]\s*(\d+),?\s*(\d{4})/);
      if (rangeMatch){ const d=safeParse(`${rangeMatch[1]} ${rangeMatch[2]}, ${rangeMatch[3]}`); if(d) return d; }
      const parts = s.replace(/[,\/]/g,' ').split(/\s+/).filter(Boolean);
      if (parts.length>=3){ const d=safeParse(parts.join(' ')); if(d) return d; }
      return null;
    }
    function insEndDateDisplay(dateStr) {
      if (!dateStr||dateStr==='null') return null;
      const d = parseInsDate(dateStr);
      if (!d) return null;
      return d.toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'});
    }
    function toInputDate(d){ if(!d||isNaN(d))return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function splitLegacyInsDate(str) {
      if (!str) return {from:'',to:''};
      const s = String(str).trim();
      let pts = s.split(/\s+to\s+/i);
      if (pts.length<2) pts = s.split(/\s+[-–]\s+/);
      if (pts.length===2){ const df=safeParse(pts[0]),dt=safeParse(pts[1]); return {from:df?toInputDate(df):'',to:dt?toInputDate(dt):''}; }
      return {from:'',to:''};
    }
    function getInsExpiry(i){ return i.insurance_date_to||i.insurance_date||null; }
    function insDateRangeDisplay(i) {
      if (i.insurance_date_from||i.insurance_date_to){
        const from = i.insurance_date_from?fmtDate(i.insurance_date_from):'—';
        const to   = i.insurance_date_to?fmtDate(i.insurance_date_to):'—';
        return `${from} → ${to}`;
      }
      return i.insurance_date||i.insurance_month||'';
    }
    function insStatus(insDateStr) {
      const d = parseInsDate(insDateStr);
      if (!d) return {type:'unknown',days:null};
      const today=new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
      const diff = Math.round((d-today)/86400000);
      if (diff<0)   return {type:'expired', days:Math.abs(diff)};
      if (diff<=14) return {type:'warning', days:diff};
      return {type:'ok',days:diff};
    }

    // ══ DASHBOARD ══
    async function loadDashboard() {
      const el = document.getElementById('dashboard-inner');
      el.innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>Loading...</div>';
      S.insurance = await getAll();
      document.getElementById('badge-insurance').textContent = S.insurance.length;

      const now = new Date(); now.setHours(0,0,0,0);
      const insWith = S.insurance.map(i=>({...i,_status:insStatus(getInsExpiry(i))}));
      const expired  = insWith.filter(i=>i._status.type==='expired').sort((a,b)=>b._status.days-a._status.days);
      const warning  = insWith.filter(i=>i._status.type==='warning').sort((a,b)=>a._status.days-b._status.days);
      const upcoming = insWith.filter(i=>i._status.type==='ok').sort((a,b)=>a._status.days-b._status.days).slice(0,8);
      const alertList = [...expired,...warning].slice(0,12);
      const todayStr = now.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      const activeCount = S.insurance.length - expired.length - warning.length;

      function insAlertRow(i) {
        const s=i._status;
        const cls=s.type==='expired'?'ins-alert-expired':s.type==='warning'?'ins-alert-warning':'ins-alert-ok';
        const icon=s.type==='expired'?'🔴':s.type==='warning'?'🟡':'🟢';
        const daysLabel=s.type==='expired'?`Expired ${s.days}d ago`:s.days===0?'Due Today':`Due in ${s.days}d`;
        return `<div class="ins-alert-bar ${cls}" style="cursor:pointer" onclick="showInsuranceModal('${i.id}')">
          <span class="ins-alert-icon">${icon}</span>
          <div class="ins-alert-info">
            <div class="ins-alert-name">${i.vehicle_name||'-'} <span style="opacity:.7;font-weight:400;font-size:11px">${i.plate_number||''}</span></div>
            <div class="ins-alert-meta">${insDateRangeDisplay(i)} · Expires: ${insEndDateDisplay(getInsExpiry(i))||'—'}</div>
          </div>
          <div class="ins-alert-days">${daysLabel}</div>
        </div>`;
      }

      el.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card" style="animation-delay:.0s"><div class="stat-icon">📋</div><div class="stat-num">${S.insurance.length}</div><div class="stat-label">Total Records</div></div>
          <div class="stat-card" style="animation-delay:.05s;border-color:rgba(248,81,73,.3)"><div class="stat-icon">🔴</div><div class="stat-num" style="color:var(--red)">${expired.length}</div><div class="stat-label">Expired</div></div>
          <div class="stat-card" style="animation-delay:.1s;border-color:rgba(210,153,34,.3)"><div class="stat-icon">🟡</div><div class="stat-num" style="color:#e3b341">${warning.length}</div><div class="stat-label">Due within 2 weeks</div></div>
          <div class="stat-card" style="animation-delay:.15s;border-color:rgba(63,185,80,.3)"><div class="stat-icon">🟢</div><div class="stat-num" style="color:var(--green)">${activeCount}</div><div class="stat-label">Active</div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">🛡 Insurance Status</div>
              <div class="ins-card-date">📅 ${todayStr}</div>
            </div>
            <button class="btn btn-default btn-sm" onclick="switchPage('insurance')">View All →</button>
          </div>
          <div class="card-body">
            <div class="alert-summary">
              <div class="alert-chip alert-chip-red">🔴 ${expired.length} Expired</div>
              <div class="alert-chip alert-chip-yellow">🟡 ${warning.length} Due within 2 weeks</div>
              <div class="alert-chip alert-chip-green">🟢 ${activeCount} Active</div>
            </div>
            ${alertList.length
              ? `<div class="ins-section-label">⚠ Requires Attention</div>${alertList.map(insAlertRow).join('')}<div style="height:14px"></div>`
              : `<div style="padding:8px 0 10px;font-size:13px;color:var(--green)">✅ No expired or near-expiry insurance.</div>`}
            ${upcoming.length
              ? `<div class="ins-section-label" style="margin-top:4px">📋 Upcoming Renewals</div>
                 ${upcoming.map(i=>`<div class="ins-alert-bar ins-alert-ok" style="cursor:pointer" onclick="showInsuranceModal('${i.id}')">
                   <span class="ins-alert-icon">🟢</span>
                   <div class="ins-alert-info">
                     <div class="ins-alert-name">${i.vehicle_name||'-'} <span style="opacity:.7;font-weight:400;font-size:11px">${i.plate_number||''}</span></div>
                     <div class="ins-alert-meta">${insDateRangeDisplay(i)} · Expires: ${insEndDateDisplay(getInsExpiry(i))||'—'}</div>
                   </div>
                   <div class="ins-alert-days">${i._status.days}d left</div>
                 </div>`).join('')}`
              : ''}
          </div>
        </div>`;
    }

    // ══ INSURANCE LIST ══
    async function loadInsurance() {
      document.getElementById('ins-table-area').innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>Loading...</div>';
      S.insurance = await getAll();
      document.getElementById('badge-insurance').textContent = S.insurance.length;
      document.getElementById('ins-count').textContent = `(${S.insurance.length})`;
      renderInsPills(); renderInsTable(); renderInsCards();
    }

    function renderInsPills() {
      document.getElementById('ins-pills').innerHTML = MONTHS.map(m=>`<div class="pill ${m===S.insFilter?'active':''}" onclick="setInsFilter('${m}')">${m==='All'?'All':m.slice(0,3)}</div>`).join('');
    }
    window.setInsFilter = m => { S.insFilter=m; renderInsPills(); renderInsTable(); renderInsCards(); };

    function filteredIns() {
      const q = S.insSearch.toLowerCase();
      let list = S.insurance;
      if (S.insFilter!=='All') list = list.filter(i=>(i.insurance_month||'').toUpperCase()===S.insFilter||(i.registration_month||'').toUpperCase()===S.insFilter);
      if (q) list = list.filter(i=>[i.vehicle_name,i.plate_number,i.department,i.mv_file_no,i.insurance_month,i.remarks].join(' ').toLowerCase().includes(q));
      return list;
    }
    function filterInsurance() {
      S.insSearch = (document.getElementById('ins-search').value||'').toLowerCase();
      document.getElementById('ins-count').textContent = `(${filteredIns().length})`;
      renderInsTable(); renderInsCards();
    }
    window.filterInsurance = filterInsurance;

    function renderInsTable() {
      const list = filteredIns(); const el = document.getElementById('ins-table-area');
      if (!list.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>No records found</div>'; return; }
      const s = i => insStatus(getInsExpiry(i));
      el.innerHTML = `<div class="table-wrap"><table><thead><tr>
        <th>#</th><th>Vehicle</th><th class="hide-mobile">Dept</th><th>Plate</th>
        <th class="hide-mobile">Insurance Period</th><th class="hide-mobile">Expiry</th><th>Status</th>
      </tr></thead><tbody>
        ${list.map(i=>{
          const st=s(i);
          const badge=st.type==='expired'?`<span class="badge badge-red">Expired</span>`:st.type==='warning'?`<span class="badge badge-amber">Due Soon</span>`:`<span class="badge badge-green">Active</span>`;
          return `<tr onclick="showInsuranceModal('${i.id}')">
            <td class="td-muted">${i.item_no||'-'}</td>
            <td class="td-name">${i.vehicle_name||'-'}</td>
            <td class="hide-mobile">${i.department?`<span class="badge badge-blue">${i.department}</span>`:'-'}</td>
            <td class="td-mono">${i.plate_number||'-'}</td>
            <td class="hide-mobile td-muted">${insDateRangeDisplay(i)}</td>
            <td class="hide-mobile td-muted">${insEndDateDisplay(getInsExpiry(i))||'—'}</td>
            <td>${badge}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    function renderInsCards() {
      const s = i => insStatus(getInsExpiry(i));
      document.getElementById('ins-cards').innerHTML = filteredIns().map((i,idx)=>{
        const st=s(i);
        const badge=st.type==='expired'?`<span class="badge badge-red">🔴 Expired</span>`:st.type==='warning'?`<span class="badge badge-amber">🟡 Due Soon</span>`:`<span class="badge badge-green">🟢 Active</span>`;
        return `<div class="m-card" style="animation-delay:${Math.min(idx,10)*0.02}s" onclick="showInsuranceModal('${i.id}')">
          <div class="flex-between gap-8"><div class="m-card-title">${i.vehicle_name||'-'}</div><span class="badge badge-amber">${i.plate_number||'-'}</span></div>
          <div class="m-card-row" style="margin-top:6px;">${i.department?`<span class="badge badge-blue">${i.department}</span>`:''}<span>🛡 ${i.insurance_month||''}</span>${badge}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">${insDateRangeDisplay(i)} · Expires: ${insEndDateDisplay(getInsExpiry(i))||'—'}</div>
        </div>`;
      }).join('');
    }

    // ══ DETAIL MODAL ══
    function showInsuranceModal(id) {
      const i = S.insurance.find(x=>x.id===id); if(!i) return;
      const st = insStatus(getInsExpiry(i));
      const statusBadge = st.type==='expired'
        ? `<span class="badge badge-red">🔴 Expired ${st.days}d ago</span>`
        : st.type==='warning'
        ? `<span class="badge badge-amber">🟡 Due in ${st.days===0?'Today':st.days+'d'}</span>`
        : `<span class="badge badge-green">🟢 Active — ${st.days}d left</span>`;
      document.getElementById('imod-title').textContent = i.vehicle_name||'Insurance Record';
      document.getElementById('imod-body').innerHTML = `
        <div class="v-hero">
          <div class="v-hero-icon">📋</div>
          <div class="v-hero-name">${i.vehicle_name||'-'}</div>
          <div class="v-hero-badges">
            <span class="badge badge-amber">${i.plate_number||'No Plate'}</span>
            ${i.department?`<span class="badge badge-blue">${i.department}</span>`:''}
            ${statusBadge}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Insurance Details</div>
          ${dr('Item No',i.item_no)}
          ${dr('MV File No',i.mv_file_no,'mono')}
          ${dr('Insurance Month',i.insurance_month)}
          ${dr('Insurance From',i.insurance_date_from?fmtDate(i.insurance_date_from):(i.insurance_date||null))}
          ${dr('Insurance To (Expiry)',i.insurance_date_to?fmtDate(i.insurance_date_to):insEndDateDisplay(i.insurance_date))}
          ${dr('Registration Month',i.registration_month)}
          ${dr('Registration Date',fmtDate(i.registration_date))}
          ${dr('Remarks',i.remarks)}
        </div>
        <div class="form-actions" style="padding-top:12px;border-top:1px solid var(--border);margin-top:4px;">
          <button class="btn btn-danger" onclick="confirmDelete('${id}')">🗑 Delete</button>
          <button class="btn btn-default" onclick="editRecord('${id}')">✏️ Edit</button>
        </div>`;
      openModal('modal-insurance');
    }
    window.showInsuranceModal = showInsuranceModal;

    // ══ ADD / EDIT ══
    function openAddModal() {
      S.editId = null;
      document.getElementById('form-title').textContent = 'Add Insurance Record';
      document.getElementById('form-body').innerHTML = iForm();
      openModal('modal-form');
    }
    window.openAddModal = openAddModal;

    function editRecord(id) {
      S.editId = id;
      closeModal('modal-insurance');
      const i = S.insurance.find(x=>x.id===id);
      document.getElementById('form-title').textContent = 'Edit Insurance Record';
      document.getElementById('form-body').innerHTML = iForm(i);
      openModal('modal-form');
    }
    window.editRecord = editRecord;

    function fi(name,label,v={},type='text'){ return `<div class="form-group"><label class="form-label">${label}</label><input class="form-input" type="${type}" name="${name}" value="${ea(v[name]||'')}"></div>`; }
    function fta(name,label,v={}){ return `<div class="form-group form-full"><label class="form-label">${label}</label><textarea class="form-textarea" name="${name}">${eh(v[name]||'')}</textarea></div>`; }

    function iForm(i={}) {
      let fromVal = i.insurance_date_from||'';
      let toVal   = i.insurance_date_to||'';
      if ((!fromVal||!toVal)&&i.insurance_date) {
        const leg = splitLegacyInsDate(i.insurance_date);
        if (!fromVal) fromVal=leg.from;
        if (!toVal)   toVal=leg.to;
      }
      return `<div class="form-grid" id="iform">
        ${fi('vehicle_name','Vehicle Name',i)}
        ${fi('plate_number','Plate Number',i)}
        ${fi('department','Department',i)}
        ${fi('mv_file_no','MV File No',i)}
        ${fi('insurance_month','Insurance Month',i)}
        <div class="form-group form-full">
          <label class="form-label">Insurance Date (From → To / Expiry)</label>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;">
            <input class="form-input" type="date" name="insurance_date_from" value="${ea(fromVal)}">
            <span style="color:var(--text2);font-size:18px;text-align:center;font-weight:300;">→</span>
            <input class="form-input" type="date" name="insurance_date_to" value="${ea(toVal)}">
          </div>
        </div>
        ${fi('registration_month','Reg Month',i)}
        ${fi('registration_date','Reg Date',i,'date')}
        ${fta('remarks','Remarks',i)}
        <div class="form-actions form-full">
          <button class="btn btn-default" onclick="closeModal('modal-form')">Cancel</button>
          <button class="btn btn-primary" onclick="saveRecord()">💾 Save</button>
        </div>
      </div>`;
    }

    async function saveRecord() {
      if (!isOnline){ toast('You are offline. Cannot save changes.','error'); return; }
      const data = {};
      document.querySelectorAll('#iform [name]').forEach(el=>data[el.name]=el.value);
      Object.keys(data).forEach(k=>{ if(data[k]==='') data[k]=null; });
      try {
        if (S.editId) {
          await updateRec(S.editId, data);
          const idx = S.insurance.findIndex(x=>x.id===S.editId);
          if (idx>=0) S.insurance[idx]={...S.insurance[idx],...data};
          toast('Updated successfully!','success');
        } else {
          const ref = await addRec(data);
          S.insurance.push({id:ref.id,...data});
          toast('Added successfully!','success');
        }
        closeModal('modal-form');
        refreshCurrent();
      } catch(e){ toast('Error: '+e.message,'error'); }
    }
    window.saveRecord = saveRecord;

    async function confirmDelete(id) {
      if (!isOnline){ toast('You are offline. Cannot delete records.','error'); return; }
      if (!confirm('Delete this record? This cannot be undone.')) return;
      try {
        await deleteRec(id);
        S.insurance = S.insurance.filter(x=>x.id!==id);
        toast('Deleted!','success');
        closeModal('modal-insurance');
        refreshCurrent();
      } catch(e){ toast('Error: '+e.message,'error'); }
    }
    window.confirmDelete = confirmDelete;

    // ── INIT ──
    loadDashboard();
  } catch(e) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#f85149;font-family:sans-serif;text-align:center;padding:20px;"><div><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;margin-bottom:8px;">Firebase Connection Failed</div><div style="font-size:13px;color:#8b949e;">Check credentials in index.html.<br>${e.message}</div></div></div>`;
  }
})();
</script>

<!-- MODALS / UTILS (outside module) -->
<script>
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeOverlay(e,id){if(e.target.id===id)closeModal(id);}
window.openModal=openModal;window.closeModal=closeModal;window.closeOverlay=closeOverlay;

function fmtDate(d){if(!d||d==='null')return '';const s=String(d);if(s.includes('00:00:00')||s.includes('T')){const dt=new Date(s);if(isNaN(dt))return s.substring(0,10);return dt.toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'});}return s.substring(0,10);}
function dr(label,val,cls=''){if(!val||val==='null'||val==='undefined'||String(val).trim()==='')return '';return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value ${cls?'detail-'+cls:''}">${val}</span></div>`;}
function ea(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastTimer;
function toast(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${type}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3000);}
window.fmtDate=fmtDate;
</script>
</body>
